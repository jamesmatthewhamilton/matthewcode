auto_approve: false
max_iterations: 100
max_bash_output: 30000
max_file_read: 50000
# Editor-on-save normalization for file_write/file_edit: strip per-line
# trailing whitespace, drop trailing blank lines, ensure one final newline.
trim_trailing_whitespace: true
verbose: false

# bash commands containing any of these words always require y/N approval,
# even when --yes / auto_approve is set.
restricted_bash_commands:
  - rm
  - curl

loop_detection:
  enabled: true
  consecutive_threshold: 2

rules:
  protected_paths:
    - ~/.*           # all hidden dirs/files (ssh, aws, gnupg, etc.)
    - /etc/          # system config
    - /private/      # macOS system files

# ── Pipeline: Main conversation
pipeline_main:
  system_prompt: |
    You are MatthewCode, a coding assistant with access to tools.
    You MUST use your tools to accomplish tasks. NEVER describe what you would do — DO IT.

    Environment:
    - Home directory: {home_dir}
    - Working directory: {working_dir}
    - Project root: {project_root}

    Workflow:
    1. Think briefly about what to do
    2. Call the appropriate tool(s)
    3. If a tool returns an error, try again and fix it
    4. Report your changes and reasoning concisely

    Rules:
    - Rule Override: Any rule below may be overridden when the user explicitly requests a different approach
    - ALWAYS read a file before editing it
    - NEVER delete files
    - When an author name is needed use: 'Matthew Hamilton'

    Style Rules:
    - NEVER use emojis
    - For one line code comments, ALWAYS use all lower-case
    - For multi-line code comments, ALWAYS use complete sentences
    - NEVER edit existing comments

    Git Rules:
    - Never commit or push code
    - If asked to commit - ALWAYS <75 chars, capitalize first word, and period at the end of sentence

    DevOps Rules:
    - Never hardcode absolute paths in project files. Use relative paths so any user can clone and build the project without modification
    - Build Management: Avoid building code unless asked. When building is necessary, use find_build_env to discover existing build environments first
    - Package Management: Use existing project-provided environments (Conda, Docker, Podman, etc.) for all dependency management. Ask user permission before installing packages directly to the system or creating new environments

    C and C++ Rules:
    - Never use bare 'int' or 'uint'. Always use explicitly sized types:
      int8_t, int16_t, int32_t, int64_t, uint8_t, uint16_t, uint32_t, uint64_t
    - Use scientific iterator naming in for-loops:
      'ii' for the outer loop, 'jj' for the first nested loop, 'kk' for the second nested loop

    Bash Rules:
    - Always write bash that is POSIX shell compliant (IEEE Std 1003.1)

  user_prompt: |
    {user_input}

# ── Pipeline: Session resume
pipeline_session_resume:
  system_prompt: |
    The user has returned to this session. Wait for their next message.
    Do not continue any previous task unless they explicitly ask you to.

# ── Pipeline: Rebirth (context compression)
pipeline_rebirth:
  num_messages_kept: 4
  system_prompt: |
    You are a summarization engine. Your only job is to read the conversation
    and emit a plain-text summary as your message content.

    - Do NOT call any tools. You have no tools.
    - Do NOT write, create, or edit any files. The summary is text in your
      reply, not a file on disk. Section headings like "Files written or
      edited" describe past actions; they are not instructions to act now.
    - Output ONLY the summary text, nothing else.
  user_prompt: |
    Summarize this conversation organized by project. For each project
    directory that was worked on, write a text section with this format:

    ## {project_root}
    Summary: Brief description of the project and what was accomplished.
    Build: Step-by-step commands to build this project from scratch. If not yet determined, write "Not yet determined."
    Decisions: Key decisions, preferences, or constraints the user stated.
    Errors: Any errors encountered and how they were resolved.
    In progress: Current task if unfinished.
    Files written or edited:
      - ./hello.cpp — C++ hello world program. Created from scratch.
      - ./GNUmakefile — build config. Edited to switch from g++ to clang++.
      - ../other-project/config.py — external file. Modified configuration.

    Use relative paths from the project root ({project_root}) for all files.
    Files in the current project: ./file.py
    Files outside project: ../other-project/file.py
    Only list files that were written or edited, not every file that was read.
    Include ALL projects that were worked on, each as its own section.

    Output ONLY the summary, no preamble.

# ── Pipeline: Loop detected
pipeline_loop_detected:
  message: |

    [LOOP DETECTED] You have called `{name}` {count} times in a row with identical arguments and identical results. DO NOT call this tool again with these arguments. Try a different approach, or ask the user for guidance.

# ── Pipeline: Tool error messages
pipeline_tool_errors:
  file_not_found: |
    Error: File not found: {path}
  file_read_too_large: |
    Error: file_read was NOT run. {path} is {len_content} chars, which exceeds the limit of {max_limit}. Retry using bash_run with 'sed -n START,ENDp {path}' to read a specific line range, or 'grep PATTERN {path}' to search for text.
  file_read_error: |
    Error reading file: {error}
  file_write_error: |
    Error writing file: {error}
  file_edit_multiple_matches: |
    Error: old_text matches {count} locations. Provide more context.
  file_edit_fuzzy_match: |
    Error: Exact match not found. Closest match at lines {start_line}-{end_line}. Read the file and use exact text.
  file_edit_not_found: |
    Error: old_text not found in file. Read the file first to get exact text.
  file_edit_error: |
    Error editing file: {error}
  bash_timeout: |
    Error: Command timed out. This may be because it opened an interactive prompt (like vim) or is waiting for input. Try using a non-interactive version of the command.
  bash_error: |
    Error: {error}
  directory_not_found: |
    Error: Directory not found: {path}
  unknown_tool: |
    Error: Unknown tool '{name}'

# ── Pipeline: Tool success messages
pipeline_tool_success:
  file_write: |
    Wrote {len_content} chars to {path}
  file_edit: |
    Edited {path} (replaced 1 occurrence)
  grep_no_matches: |
    No matches for '{pattern}' in {path}
  find_no_matches: |
    No files matching '{pattern}' found in {path}

# ── Pipeline: User confirmations
pipeline_confirmations:
  file_write_prompt: |
    Write to {path} ({len_content} chars)?
  file_exists_warning: |
    (file exists, will be overwritten)
  file_edit_prompt: |
    Edit {path}:

# ── Pipeline: Status messages
pipeline_status:
  pinging_host: "[info]Pinging {host}...[/info]"
  starting_slurm: "[info]Starting Slurm session '{name}'...[/info]"
  found_existing_job: "[info]Found existing Slurm job {job_id} ({state}) — reusing.[/info]"
  no_existing_job: "[info]No existing Slurm job for '{name}'; submitting fresh.[/info]"
  provider_ready: "[info]Provider '{provider}' -> {url} (job {job_id}, gpu {gpu})[/info]"

# ── Pipeline: Tool rejected by user
pipeline_tool_rejected:
  message: |
    The user rejected this action. Do not call any more tools.
    Instead, ask the user what they would like you to do differently.
    You may suggest an alternative approach.

# ── Pipeline: Tool skipped (a prior tool in the same batch was rejected)
pipeline_tool_skipped:
  message: |
    Skipped: an earlier tool call in this batch was rejected by the user, so
    this call was not run. Wait for the users instructions before retrying.

# ── Aliases: canned prompts, invoked as /<token> or --<token>. Add any number;
# each key becomes a command/flag named after it. A value is the prompt text
# itself, or a mapping with `prompt` and an optional `help` line for /help and
# --help. Any text typed after the token is pasted at the bottom of the prompt.
aliases:
  qcm:
    help: Quick commit message generated from the current git diff.
    prompt: |
      - Generate a concise commit message for the current 'git diff'
      - Output only the commit message
      - It must be <80 chars
      - Do not commit yourself
      - Start with capitalized word
      - Talk in past tense, 'added'
      - End sentences with period
      - If a ticket tag is included below use that ticket tag
      - 'XXXX-1234' at beginning of ticket
      - '(#1)' Github style tickets at end of ticket after period
      - If no ticket is provided, search the git branch to see if the ticket name or number is in the git branch
      - If no ticket is provided and the branch does not contain the ticket name, search the last 5 git commit messages and determine which commit is similar the current work in git diff. Use the ticket tag of the most similar commit. If non are similar output no commit tag.
      - Output the commit message without the ticket if nothing is found
  qd:
    help: Quick diff summary of the current git changes.
    prompt: |
      - Summarize the current 'git diff' (include staged and unstaged changes)
      - Group the summary by file, one short bullet per meaningful change
      - Lead with a one-sentence overview of what the changes accomplish
      - Note anything risky or incomplete (TODOs, debug prints, dead code)
      - Do not modify any files
      - Output only the summary
  qr:
    help: Quick review of the current git changes.
    prompt: |
      - Review the current 'git diff' (include staged and unstaged changes)
      - Check if any of the new code can be minimized or reduced (duplication, dead branches, simpler equivalents, existing helpers it should reuse)
      - Check if the new code could cause any issues, and list them (bugs, edge cases, regressions, performance, error handling)
      - For each finding, name the file and line and briefly say why
      - If nothing is found say so plainly
      - Do not modify any files
      - Output only the review
